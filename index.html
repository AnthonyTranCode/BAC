<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Year Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cell-w:      57px;
      --label-w:     76px;
      --cell-h:      60px;
      --track-h:     28px;
      --bar-h:       26px;
      --font:        'Trebuchet MS', Inter, system-ui, sans-serif;
      --font-headline: Georgia, 'Times New Roman', serif;
      --c-adventures: #f97316;
      --c-occasions:  #eab308;
      --c-holidays:   #0891b2;
      --c-network:    #16a34a;
      --c-misogi-fg:  #dc2626;
      --c-bucket-fg:  #1e293b;
      --bg-cell:      #ffffff;
      --bg-weekend:   #dde5f0;
      --bg-inactive:  #c9d0db;
      --text-inactive:#8fa0b4;
      --border:       #d1d9e4;
      --border-dark:  #1e293b;
    }

    body {
      font-family: var(--font);
      background: #e8ecf1;
      color: #1e293b;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ─── Page Header (title + legend + controls) ─── */
    .page-header {
      background: #fff;
      padding: 20px 28px 18px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 3px solid var(--border-dark);
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex-shrink: 0;
    }

    .page-title {
      font: 700 48px/0.9 var(--font-headline);
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: -1.5px;
      white-space: nowrap;
    }

    .page-title .title-year {
      color: #1e3a5f;
    }

    .header-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* Settings badge in header */
    .settings-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border: 1.5px solid #cbd5e1;
      border-radius: 20px;
      background: #f8fafc;
      color: #475569;
      font: 700 12px/1 var(--font);
      cursor: pointer;
      transition: all .13s;
      flex-shrink: 0;
    }
    .settings-badge:hover { border-color: #94a3b8; background: #f1f5f9; color: #1e293b; }
    .settings-badge svg { flex-shrink: 0; opacity: .6; }

    .sep { width: 1px; height: 20px; background: #cbd5e1; flex-shrink: 0; }

    .export-btn {
      padding: 5px 12px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 5px;
      font: 700 12px/1 var(--font);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
      letter-spacing: .4px;
      transition: background .13s;
    }
    .export-btn:hover { background: #0f2040; }
    .export-btn:disabled { opacity: .55; cursor: default; }

    /* ─── Legend ─────────────────────────────────────── */
    .legend {
      display: grid;
      grid-template-columns: repeat(3, auto);
      gap: 10px 28px;
      align-content: start;
    }

    .leg-item {
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .leg-swatch {
      width: 30px;
      height: 30px;
      border-radius: 5px;
      flex-shrink: 0;
    }

    .leg-label {
      font: 700 13px/1 var(--font);
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: 0.2px;
    }

    .sw-adventures { background: var(--c-adventures); }
    .sw-occasions  { background: var(--c-occasions); }
    .sw-holidays   { background: var(--c-holidays); }
    .sw-network    { background: var(--c-network); }
    .sw-misogi     { background: transparent; border: 3px dashed var(--c-misogi-fg); }
    .sw-bucketlist { background: transparent; border: 3px dashed var(--c-bucket-fg); }

    /* ─── Zoom outer scroll container ───────────────── */
    .page-outer {
      flex: 1;
      overflow: auto;
      background: #e8ecf1;
    }

    /* Scaler — receives CSS zoom property */
    #page-scaler {
      display: inline-block;
      min-width: 100%;
    }

    /* ─── Calendar wrapper ──────────────────────────── */
    .cal-wrap {
      padding: 16px 28px 80px;
    }

    .cal-grid { min-width: max-content; }

    /* ─── Month rows ────────────────────────────────── */
    .month-row {
      display: flex;
      align-items: stretch;
      margin-bottom: 1px;
    }

    .month-lbl {
      width: var(--label-w);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 700 13px/1 var(--font);
      color: #1e3a5f;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 5px 0 0 5px;
    }

    .days-area {
      position: relative;
      display: flex;
      flex-direction: column;
      z-index: 0; /* stacking context so wknd-col z-index:-1 is scoped here */
    }

    .wknd-col {
      position: absolute;
      top: 0; bottom: 0;
      background: rgba(186, 202, 220, 0.42);
      z-index: -1;
      pointer-events: none;
    }

    /* Absolutely-positioned multi-day bars — overlays cells below the date header */
    .ev-layer {
      position: absolute;
      top: 11px; /* sit just below the .cell-hdr (7px font + 3px padding + 1px border) */
      left: 0;
      width: calc(31 * var(--cell-w));
      pointer-events: none;
      z-index: 5;
    }

    /* Day cells row */
    .cells-row { display: flex; }

    .day-cell {
      width: var(--cell-w);
      height: var(--cell-h);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-cell);
      border: 1px solid var(--border);
      border-left: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      transition: background .1s;
    }

    .day-cell:last-child { border-radius: 0 5px 5px 0; }
    .day-cell:hover:not(.inactive) { background: #f0f7ff !important; }
    .day-cell.weekend  { background: transparent; }
    .day-cell.inactive { background: var(--bg-inactive) !important; cursor: default; }


    /* Cell header: "Mon 1" on one line */
    .cell-hdr {
      padding: 2px 2px 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .cell-hdr-txt {
      font: 700 7px/1 var(--font);
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .2px;
      white-space: nowrap;
    }

    .day-cell.weekend  .cell-hdr-txt { color: #4a6080; }
    .day-cell.inactive .cell-hdr-txt { color: var(--text-inactive); }

    .cell-evs {
      flex: 1;
      padding: 1px 2px 2px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* ─── Single-day chips ──────────────────────────── */
    .chip {
      font: 700 8px/1 var(--font);
      padding: 2px 3px;
      border-radius: 3px;
      overflow: hidden;
      cursor: grab;
      pointer-events: auto;
      text-transform: uppercase;
      letter-spacing: .2px;
      min-height: 13px;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      line-height: 1.2;
      position: relative;
      user-select: none;
    }
    .chip.chip-dragging { opacity: 0.35; cursor: grabbing; }

    /* Chip right-resize handle */
    .chip-resize-handle {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 6px;
      cursor: ew-resize;
      background: rgba(0,0,0,0.22);
      opacity: 0;
      border-radius: 0 3px 3px 0;
      transition: opacity .12s;
    }
    .chip:hover .chip-resize-handle { opacity: 1; }

    /* Drop-target highlight when dragging a chip */
    .day-cell.drop-target { background: #dbeafe !important; outline: 2px solid #3b82f6; outline-offset: -2px; }

    /* Ghost chip (floating clone during move drag) */
    #chip-ghost {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.8;
      border-radius: 3px;
      font: 700 8px/1.2 var(--font);
      padding: 2px 3px;
      text-transform: uppercase;
      letter-spacing: .2px;
      text-align: center;
      white-space: normal;
    }

    /* Ghost bar (floating during chip resize-extend) */
    #chip-ghost-bar {
      position: fixed;
      height: 20px;
      border-radius: 3px;
      font: 700 8px/20px var(--font);
      text-transform: uppercase;
      letter-spacing: .2px;
      text-align: center;
      color: #fff;
      opacity: 0.75;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
      overflow: hidden;
    }

    .chip.cat-adventures { background: var(--c-adventures); color: #fff; }
    .chip.cat-occasions  { background: var(--c-occasions);  color: #fff; }
    .chip.cat-holidays   { background: var(--c-holidays);   color: #fff; }
    .chip.cat-network    { background: var(--c-network);    color: #fff; }
    .chip.cat-misogi     { background: transparent; border: 1.5px dashed var(--c-misogi-fg); color: var(--c-misogi-fg); }
    .chip.cat-bucketlist { background: transparent; border: 1.5px dashed var(--c-bucket-fg); color: var(--c-bucket-fg); }

    /* ─── Multi-day event bars ──────────────────────── */
    .ev-bar {
      position: absolute;
      height: var(--bar-h);
      border-radius: 4px;
      font: 700 11px/var(--bar-h) var(--font);
      color: #fff;
      padding: 0 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: grab;
      pointer-events: auto;
      z-index: 10;
      text-transform: uppercase;
      letter-spacing: .4px;
      text-align: center;
      user-select: none;
    }

    .ev-bar:hover { filter: brightness(1.08); }
    .ev-bar.dragging { opacity: .6; cursor: grabbing; box-shadow: 0 4px 18px rgba(0,0,0,.28); }

    /* Resize drag handles (left / right edges of bar) */
    .ev-resize-handle {
      position: absolute;
      top: 0; bottom: 0;
      width: 8px;
      cursor: ew-resize;
      background: rgba(0,0,0,.22);
      opacity: 0;
      transition: opacity .12s;
      z-index: 1;
    }
    .ev-bar:hover .ev-resize-handle { opacity: 1; }
    .ev-resize-left  { left: 0;  border-radius: 4px 0 0 4px; }
    .ev-resize-right { right: 0; border-radius: 0 4px 4px 0; }

    .ev-bar.cat-adventures { background: var(--c-adventures); }
    .ev-bar.cat-occasions  { background: var(--c-occasions); color: #1e293b; }
    .ev-bar.cat-holidays   { background: var(--c-holidays); }
    .ev-bar.cat-network    { background: var(--c-network); }
    .ev-bar.cat-misogi     {
      background: transparent;
      border: 2.5px dashed var(--c-misogi-fg);
      color: var(--c-misogi-fg);
      line-height: calc(var(--bar-h) - 5px);
    }
    .ev-bar.cat-bucketlist {
      background: transparent;
      border: 2.5px dashed var(--c-bucket-fg);
      color: var(--c-bucket-fg);
      line-height: calc(var(--bar-h) - 5px);
    }

    /* ─── Zoom bar ──────────────────────────────────── */
    .zoom-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      background: #1e293b;
      border-radius: 40px;
      padding: 5px 7px;
      display: flex;
      align-items: center;
      gap: 1px;
      box-shadow: 0 4px 24px rgba(0,0,0,.4), 0 1px 4px rgba(0,0,0,.2);
      user-select: none;
    }

    .zoom-action {
      width: 30px; height: 30px;
      border: none; background: transparent;
      color: #fff; font-size: 22px; font-weight: 300; line-height: 1;
      border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .12s;
      flex-shrink: 0;
    }
    .zoom-action:hover { background: rgba(255,255,255,.18); }
    .zoom-action:active { background: rgba(255,255,255,.28); }

    .zoom-pct-btn {
      min-width: 58px; height: 30px;
      border: none; background: transparent;
      color: #fff; font: 700 13px/1 var(--font);
      border-radius: 6px; cursor: pointer;
      transition: background .12s;
      padding: 0 4px;
    }
    .zoom-pct-btn:hover { background: rgba(255,255,255,.18); }

    .zoom-divider {
      width: 1px; height: 18px;
      background: rgba(255,255,255,.2);
      flex-shrink: 0;
      margin: 0 3px;
    }

    /* ─── Modal ─────────────────────────────────────── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.55);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-bg.hidden { display: none; }

    .modal {
      background: #fff;
      border-radius: 12px;
      padding: 22px 24px 20px;
      width: 440px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 24px 64px rgba(0,0,0,.22);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .modal-ttl {
      font: 700 16px/1 var(--font-headline);
      color: #1e3a5f;
    }

    .modal-date-lbl {
      font: 400 12px/1 var(--font);
      color: #64748b;
      margin-top: 4px;
    }

    .modal-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 20px;
      line-height: 1;
      padding: 0 4px;
    }
    .modal-close:hover { color: #475569; }

    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }

    .fld { display: flex; flex-direction: column; gap: 4px; flex: 1; }

    .fld label {
      font: 700 10px/1 var(--font);
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .6px;
    }

    .fld input, .fld select {
      padding: 8px 10px;
      border: 1.5px solid #d1d9e4;
      border-radius: 6px;
      font: 400 13px/1 var(--font);
      color: #1e293b;
      outline: none;
      width: 100%;
    }
    .fld input:focus, .fld select:focus { border-color: var(--c-holidays); }

    .emoji-inp { font-size: 20px; text-align: center; width: 64px !important; flex: none; }

    .modal-actions { display: flex; gap: 8px; margin-top: 18px; }

    .btn-save {
      flex: 1; padding: 9px;
      background: #1e3a5f; color: #fff;
      border: none; border-radius: 7px;
      font: 700 13px/1 var(--font); cursor: pointer;
    }
    .btn-save:hover { background: #0f2040; }

    .btn-del {
      padding: 9px 14px;
      background: #fee2e2; color: #dc2626;
      border: none; border-radius: 7px;
      font: 700 13px/1 var(--font); cursor: pointer;
    }
    .btn-del:hover { background: #fecaca; }

    .btn-cancel {
      padding: 9px 14px;
      background: #f1f5f9; color: #475569;
      border: none; border-radius: 7px;
      font: 700 13px/1 var(--font); cursor: pointer;
    }
    .btn-cancel:hover { background: #e2e8f0; }

    .hidden { display: none !important; }

    .err-msg {
      color: #dc2626;
      font: 400 12px/1 var(--font);
      margin-top: -8px;
      margin-bottom: 4px;
    }

    /* ─── Setup / Onboarding Overlay ────────────────── */
    .setup-overlay {
      position: fixed;
      inset: 0;
      z-index: 900;
      background: #e8ecf1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .setup-overlay.hidden { display: none !important; }

    .setup-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 48px 36px;
      width: 520px;
      max-width: calc(100vw - 32px);
      box-shadow: 0 8px 48px rgba(0,0,0,.13);
      border: 1.5px solid #e2e8f0;
    }

    .setup-app-name {
      font: 700 10px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .setup-heading {
      font: 700 30px/1 var(--font-headline);
      color: #1e293b;
      text-transform: uppercase;
      letter-spacing: -1px;
      margin-bottom: 6px;
    }

    .setup-sub {
      font: 400 14px/1.6 var(--font);
      color: #64748b;
      margin-bottom: 32px;
    }

    .setup-section-lbl {
      font: 700 10px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: .9px;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .setup-year-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .setup-year-card {
      flex: 1;
      padding: 20px 10px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      font: 700 26px/1 var(--font-headline);
      color: #94a3b8;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .setup-year-card:hover:not(.selected) { border-color: #94a3b8; color: #475569; background: #f1f5f9; }
    .setup-year-card.selected { border-color: #1e3a5f; background: #1e3a5f; color: #fff; }

    .setup-country-group {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    .setup-country-btn {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      font: 700 13px/1 var(--font);
      color: #64748b;
      cursor: pointer;
      text-align: center;
      transition: all .15s;
    }
    .setup-country-btn:hover:not(.selected) { border-color: #94a3b8; color: #475569; background: #f1f5f9; }
    .setup-country-btn.selected { border-color: var(--c-holidays); background: #e0f2fe; color: var(--c-holidays); font-weight: 800; }

    .setup-start-btn {
      width: 100%;
      padding: 15px;
      background: #1e3a5f;
      color: #fff;
      border: none;
      border-radius: 10px;
      font: 700 13px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: .8px;
      cursor: pointer;
      transition: background .13s;
    }
    .setup-start-btn:hover { background: #0f2040; }

    .setup-cancel-row {
      text-align: center;
      margin-top: 12px;
    }
    .setup-cancel-link {
      background: none;
      border: none;
      color: #94a3b8;
      font: 400 13px/1 var(--font);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .setup-cancel-link:hover { color: #64748b; }

    /* ─── Category Manager ──────────────────────── */
    .cat-mgr-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1.5px solid #cbd5e1;
      border-radius: 20px;
      background: #f8fafc;
      color: #475569;
      font: 600 12px/1 var(--font);
      cursor: pointer;
      transition: all .13s;
      flex-shrink: 0;
    }
    .cat-mgr-btn:hover { border-color: #94a3b8; background: #f1f5f9; color: #1e293b; }

    .cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .cat-row:last-child { border-bottom: none; }

    .cat-color-inp {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 2px solid #e2e8f0;
      cursor: pointer;
      padding: 2px;
      flex-shrink: 0;
      background: none;
    }

    .cat-name-inp {
      flex: 1;
      padding: 7px 10px;
      border: 1.5px solid #d1d9e4;
      border-radius: 6px;
      font: 400 13px/1 var(--font);
      color: #1e293b;
      outline: none;
      min-width: 0;
    }
    .cat-name-inp:focus { border-color: #0891b2; }

    .cat-style-grp {
      display: flex;
      border: 1.5px solid #d1d9e4;
      border-radius: 6px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .cat-style-btn {
      padding: 6px 10px;
      font: 700 10px/1 var(--font);
      text-transform: uppercase;
      letter-spacing: .3px;
      border: none;
      background: #f8fafc;
      color: #64748b;
      cursor: pointer;
      transition: all .12s;
    }
    .cat-style-btn.active { background: #1e3a5f; color: #fff; }
    .cat-style-btn:not(.active):hover { background: #f1f5f9; color: #475569; }

    .cat-del-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      color: #cbd5e1;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all .12s;
      flex-shrink: 0;
      line-height: 1;
    }
    .cat-del-btn:not(:disabled):hover { color: #dc2626; background: #fee2e2; }
    .cat-del-btn:disabled { opacity: .3; cursor: default; }

    .cat-usage-warn {
      font: 400 10px/1 var(--font);
      color: #f59e0b;
      white-space: nowrap;

<script>
// ── Constants ────────────────────────────────────────────────
const CELL_W    = 57;   // matches --cell-w
const TRACK_H   = 28;   // matches --track-h
const BAR_H     = 26;   // matches --bar-h
const CELL_HDR_H = 11;  // actual rendered height of .cell-hdr (7px font + 3px padding + 1px border)

const MONTHS  = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const MONTH_LG= ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DOW     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const ZOOM_MIN  = 0.3;
const ZOOM_MAX  = 2.5;
const ZOOM_STEP = 0.1;

// ── State ────────────────────────────────────────────────────
let curYear    = 2026;
let curCountry = 'CA';
let allEvents  = {};
let editId     = null;
let curZoom    = 1.0;

// ── Utilities ────────────────────────────────────────────────
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function daysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
function getDOW(y, m, d)   { return new Date(y, m, d).getDay(); }

function fmtDate(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  const d = String(dt.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

function parseDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return { year: y, month: m - 1, day: d };
}

function dateInt(s) { return s ? parseInt(s.replace(/-/g, ''), 10) : 0; }

function padDate(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
}

function todayStr() {
  const n = new Date();
  return padDate(n.getFullYear(), n.getMonth(), n.getDate());
}

// ── Holiday Engine ───────────────────────────────────────────
function easter(year) {
  const a = year % 19,  b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4;
  const f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
  const h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4;
  const l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day   = ((h + l - 7 * m + 114) % 31) + 1;
  return new Date(year, month - 1, day);
}

function nthWD(y, m, wd, n) {
  const dim = daysInMonth(y, m);
  if (n > 0) {
    const fd = new Date(y, m, 1).getDay();
    const day = 1 + ((wd - fd + 7) % 7) + (n - 1) * 7;
    return day <= dim ? new Date(y, m, day) : null;
  } else {
    const ld  = new Date(y, m, dim).getDay();
    return new Date(y, m, dim - ((ld - wd + 7) % 7));
  }
}

function getHolidays(year, country) {
  const list = [];
  const add  = (dt, name) => dt && list.push({ date: fmtDate(dt), name });

  const ea = easter(year);
  const gf = new Date(ea); gf.setDate(ea.getDate() - 2);
  const em = new Date(ea); em.setDate(ea.getDate() + 1);

  if (country === 'CA') {
    add(new Date(year, 0, 1),  "New Year's Day");
    add(gf,                    "Good Friday");
    add(em,                    "Easter Monday");
    const may24dow = new Date(year, 4, 24).getDay();
    const vicBack  = may24dow === 1 ? 0 : may24dow === 0 ? 6 : may24dow - 1;
    add(new Date(year, 4, 24 - vicBack), "Victoria Day");
    add(new Date(year, 6, 1),  "Canada Day");
    add(nthWD(year, 8, 1, 1), "Labour Day");
    add(nthWD(year, 9, 1, 2), "Thanksgiving");
    add(new Date(year, 10,11), "Remembrance Day");
    add(new Date(year, 11,25), "Christmas Day");
    add(new Date(year, 11,26), "Boxing Day");
  } else {
    add(new Date(year, 0, 1),  "New Year's Day");
    add(nthWD(year, 0, 1, 3), "MLK Jr. Day");
    add(nthWD(year, 1, 1, 3), "Presidents' Day");
    add(gf,                    "Good Friday");
    add(nthWD(year, 4, 1,-1), "Memorial Day");
    add(new Date(year, 5,19), "Juneteenth");
    add(new Date(year, 6, 4),  "Independence Day");
    add(nthWD(year, 8, 1, 1), "Labor Day");
    add(nthWD(year, 9, 1, 2), "Columbus Day");
    add(new Date(year, 10,11), "Veterans Day");
    add(nthWD(year,10, 4, 4), "Thanksgiving");
    add(new Date(year, 11,25), "Christmas Day");
  }

  return list;
}

// ── LocalStorage ─────────────────────────────────────────────
function lsKey(y) { return `bac-planner-${y}`; }

function loadAll() {
  [2026, 2027, 2028].forEach(y => {
    try { allEvents[y] = JSON.parse(localStorage.getItem(lsKey(y))) || []; }
    catch { allEvents[y] = []; }
  });
}

function persist(y) {
  localStorage.setItem(lsKey(y), JSON.stringify(allEvents[y] || []));
}

// ── Track Assignment ─────────────────────────────────────────
function assignTracks(bars) {
  const sorted = [...bars].sort((a, b) => a.s - b.s || a.e - b.e);
  const ends   = [];
  for (const bar of sorted) {
    let t = 0;
    while (ends[t] !== undefined && ends[t] >= bar.s) t++;
    bar.track = t;
    ends[t]   = bar.e;
  }
  return { sorted, maxTracks: ends.length };
}

// ── Calendar Render ──────────────────────────────────────────
function renderCalendar() {
  const grid  = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const hols = loadHolidayList(curYear, curCountry);
  const hMap = {};
  for (const h of hols) {
    (hMap[h.date] = hMap[h.date] || []).push(h.name);
  }

  const uEvts = allEvents[curYear] || [];
  const today = todayStr();

  // Pre-scan all months to find the uniform cell height needed to fit the busiest day
  const MIN_CHIP_H = 18;  // minimum readable chip height in px
  let uniformCellH = 40;  // absolute floor
  for (let pm = 0; pm < 12; pm++) {
    const pdim   = daysInMonth(curYear, pm);
    const pmsInt = dateInt(padDate(curYear, pm, 1));
    const pmeInt = dateInt(padDate(curYear, pm, pdim));
    const pBars = [], pChips = {};
    for (const ev of uEvts) {
      const evEnd = ev.endDate || ev.startDate;
      if (dateInt(evEnd) < pmsInt || dateInt(ev.startDate) > pmeInt) continue;
      const { year: sy, month: sm, day: sd } = parseDate(ev.startDate);
      const { year: ey, month: em, day: ed } = parseDate(evEnd);
      if (ev.endDate && ev.endDate !== ev.startDate) {
        pBars.push({ s: (sm === pm && sy === curYear) ? sd : 1,
                     e: (em === pm && ey === curYear) ? ed : pdim });
      } else {
        (pChips[sd] = pChips[sd] || []).push(ev);
      }
    }
    const { sorted: pTracked } = pBars.length ? assignTracks(pBars) : { sorted: [], maxTracks: 0 };
    // Per-day track counts for this month
    const pDayTracks = {};
    for (const bar of pTracked) {
      for (let d = bar.s; d <= bar.e; d++) {
        pDayTracks[d] = Math.max(pDayTracks[d] || 0, bar.track + 1);
      }
    }
    // Find the day that needs the most vertical space
    for (let d = 1; d <= pdim; d++) {
      const ds       = padDate(curYear, pm, d);
      const cnt      = (hMap[ds]?.length || 0) + (pChips[d]?.length || 0);
      const tracks   = pDayTracks[d] || 0;
      const padTop   = tracks > 0 ? tracks * TRACK_H + 4 : 0;
      const chipN    = Math.max(1, cnt);
      const pH = CELL_HDR_H + 1 + padTop + 3 + chipN * MIN_CHIP_H + (chipN - 1) * 2;
      if (pH > uniformCellH) uniformCellH = pH;
    }
  }

  for (let m = 0; m < 12; m++) {
    const dim    = daysInMonth(curYear, m);
    const mStart = padDate(curYear, m, 1);
    const mEnd   = padDate(curYear, m, dim);
    const msInt  = dateInt(mStart);
    const meInt  = dateInt(mEnd);

    // Partition events
    const bars       = [];
    const chipsByDay = {};

    for (const ev of uEvts) {
      const evEnd = ev.endDate || ev.startDate;
      const evSI  = dateInt(ev.startDate);
      const evEI  = dateInt(evEnd);
      if (evEI < msInt || evSI > meInt) continue;

      const { year: sy, month: sm, day: sd } = parseDate(ev.startDate);
      const { year: ey, month: em, day: ed } = parseDate(evEnd);

      if (ev.endDate && ev.endDate !== ev.startDate) {
        const bs = (sm === m && sy === curYear) ? sd : 1;
        const be = (em === m && ey === curYear) ? ed : dim;
        bars.push({ ...ev, s: bs, e: be });
      } else {
        (chipsByDay[sd] = chipsByDay[sd] || []).push(ev);
      }
    }

    const { sorted: trackedBars } = bars.length
      ? assignTracks(bars)
      : { sorted: [], maxTracks: 0 };

    // Per-day track counts so only cells under a bar get top padding
    const dayTracks = {};
    for (const bar of trackedBars) {
      for (let d = bar.s; d <= bar.e; d++) {
        dayTracks[d] = Math.max(dayTracks[d] || 0, bar.track + 1);
      }
    }

    // Row
    const row = document.createElement('div');
    row.className = 'month-row';

    // Month label
    const lbl = document.createElement('div');
    lbl.className = 'month-lbl';
    lbl.textContent = MONTHS[m];
    row.appendChild(lbl);

    // Days area
    const area = document.createElement('div');
    area.className = 'days-area';

    // Weekend column bands — full-height behind cells (all 31 positions incl. inactive)
    for (let d = 1; d <= 31; d++) {
      const dow = getDOW(curYear, m, d);  // rolls into next month for d > dim, giving correct DOW for that grid position
      if (dow === 0 || dow === 6) {
        const band = document.createElement('div');
        band.className = 'wknd-col';
        band.style.left  = ((d - 1) * CELL_W) + 'px';
        band.style.width = CELL_W + 'px';
        area.appendChild(band);
      }
    }

    // Event bars layer (built first, appended after cells so z-index works cleanly)
    const evLyr = document.createElement('div');
    evLyr.className = 'ev-layer';

    for (const bar of trackedBars) {
      const barEl = document.createElement('div');
      barEl.className = `ev-bar cat-${bar.category}`;
      barEl.style.left  = ((bar.s - 1) * CELL_W + 1) + 'px';
      barEl.style.width = ((bar.e - bar.s + 1) * CELL_W - 2) + 'px';
      barEl.style.top   = (bar.track * TRACK_H + 1) + 'px';
      barEl.textContent = (bar.emoji ? bar.emoji + ' ' : '') + bar.title;
      barEl.title       = bar.title;
      applyCatStyle(barEl, bar.category);

      // mousedown drives both click (no movement) and drag (movement)
      barEl.addEventListener('mousedown', e => {
        if (e.target.classList.contains('ev-resize-handle')) return;
        startDrag(e, bar, 'move', barEl);
      });

      // Resize handles — only where the event actually starts/ends in this month
      const evSP = parseDate(bar.startDate);
      const evEP = parseDate(bar.endDate || bar.startDate);
      if (evSP.year === curYear && evSP.month === m) {
        const lh = document.createElement('div');
        lh.className = 'ev-resize-handle ev-resize-left';
        lh.addEventListener('mousedown', e => { e.stopPropagation(); startDrag(e, bar, 'resize-start', barEl); });
        barEl.appendChild(lh);
      }
      if (evEP.year === curYear && evEP.month === m) {
        const rh = document.createElement('div');
        rh.className = 'ev-resize-handle ev-resize-right';
        rh.addEventListener('mousedown', e => { e.stopPropagation(); startDrag(e, bar, 'resize-end', barEl); });
        barEl.appendChild(rh);
      }

      evLyr.appendChild(barEl);
    }

    // Cells row (no top margin — ev-layer overlays from top: 18px via CSS)
    const cells = document.createElement('div');
    cells.className = 'cells-row';

    for (let d = 1; d <= 31; d++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      cell.style.height = uniformCellH + 'px';
      if (d > dim) {
        cell.classList.add('inactive');
        const hdr = document.createElement('div');
        hdr.className = 'cell-hdr';
        const txt = document.createElement('span');
        txt.className = 'cell-hdr-txt';
        txt.textContent = d;
        hdr.appendChild(txt);
        cell.appendChild(hdr);
        cells.appendChild(cell);
        continue;
      }

      const dow     = getDOW(curYear, m, d);
      const dateStr = padDate(curYear, m, d);

      if (dow === 0 || dow === 6) cell.classList.add('weekend');
      if (dateStr === today)      cell.classList.add('today');

      cell.dataset.date = dateStr;
      cell.addEventListener('click', () => openModal(dateStr, null));

      // Cell header: "Thu 1"
      const hdr = document.createElement('div');
      hdr.className = 'cell-hdr';
      const txt = document.createElement('span');
      txt.className = 'cell-hdr-txt';
      txt.textContent = DOW[dow] + ' ' + d;
      hdr.appendChild(txt);
      cell.appendChild(hdr);

      // Events area — top padding only on days where a bar actually overlaps
      const evArea = document.createElement('div');
      evArea.className = 'cell-evs';
      const dayCellPadTop = (dayTracks[d] || 0) > 0 ? (dayTracks[d] * TRACK_H + 4) : 0;
      if (dayCellPadTop) evArea.style.paddingTop = dayCellPadTop + 'px';

      if (hMap[dateStr]) {
        for (const name of hMap[dateStr]) {
          const chip = document.createElement('div');
          chip.className = 'chip cat-holidays';
          chip.style.background = '#b0b8c4';
          chip.style.color      = '#fff';
          chip.style.border     = '';
          chip.textContent = name;
          chip.title = name;
          evArea.appendChild(chip);
        }
      }

      if (chipsByDay[d]) {
        for (const ev of chipsByDay[d]) {
          const chip = document.createElement('div');
          chip.className = `chip cat-${ev.category}`;
          applyCatStyle(chip, ev.category);
          chip.textContent = (ev.emoji ? ev.emoji + ' ' : '') + ev.title;
          chip.title = ev.title;

          // Drag-to-move: mousedown drives both click (no movement) and drag
          chip.addEventListener('mousedown', e => {
            if (e.target.classList.contains('chip-resize-handle')) return;
            startChipDrag(e, ev, chip, dateStr);
          });

          // Right resize handle — extend to multi-day
          const rh = document.createElement('div');
          rh.className = 'chip-resize-handle';
          rh.addEventListener('mousedown', e => {
            e.stopPropagation();
            startChipResize(e, ev, chip, dateStr);
          });
          chip.appendChild(rh);

          evArea.appendChild(chip);
        }
      }

      cell.appendChild(evArea);
      cells.appendChild(cell);
    }

    area.appendChild(cells);
    area.appendChild(evLyr);  // after cells so bars render on top
    row.appendChild(area);
    grid.appendChild(row);
  }
  requestAnimationFrame(fitChips);
}

function fitChips() {
  document.querySelectorAll('.chip').forEach(chip => {
    chip.style.fontSize = '';
    let size = 8;
    while (chip.scrollWidth > chip.clientWidth && size > 4.5) {
      size -= 0.5;
      chip.style.fontSize = size + 'px';
    }
  });
}

// ── Modal ────────────────────────────────────────────────────
function openModal(dateStr, ev) {
  editId = ev ? ev.id : null;

  const { year, month, day } = parseDate(dateStr);
  document.getElementById('modal-ttl').textContent = ev ? 'Edit Event' : 'Add Event';
  document.getElementById('modal-date-lbl').textContent =
    `${MONTH_LG[month]} ${day}, ${year}`;

  document.getElementById('f-title').value = ev?.title    || '';
  document.getElementById('f-cat').value   = ev?.category || 'adventures';
  document.getElementById('f-start').value = ev?.startDate || dateStr;
  document.getElementById('f-end').value   = ev?.endDate   || '';

  document.getElementById('btn-del').classList.toggle('hidden', !ev);
  document.getElementById('title-err').classList.add('hidden');
  document.getElementById('date-err').classList.add('hidden');
  document.getElementById('modal-bg').classList.remove('hidden');
  document.getElementById('f-title').focus();
}

function closeModal() {
  document.getElementById('modal-bg').classList.add('hidden');
  editId = null;
}

function saveEvent() {
  const title = document.getElementById('f-title').value.trim();
  const start = document.getElementById('f-start').value;
  const end   = document.getElementById('f-end').value || null;
  const emoji = null;
  const cat   = document.getElementById('f-cat').value;

  let ok = true;
  if (!title) {
    document.getElementById('title-err').classList.remove('hidden');
    document.getElementById('f-title').focus();
    ok = false;
  } else {
    document.getElementById('title-err').classList.add('hidden');
  }
  if (end && start && dateInt(end) < dateInt(start)) {
    document.getElementById('date-err').classList.remove('hidden');
    ok = false;
  } else {
    document.getElementById('date-err').classList.add('hidden');
  }
  if (!ok) return;

  const { year } = parseDate(start);
  if (!allEvents[year]) allEvents[year] = [];

  if (editId) {
    const idx = allEvents[year].findIndex(e => e.id === editId);
    if (idx >= 0)
      allEvents[year][idx] = { id: editId, title, category: cat, startDate: start, endDate: end, emoji };
  } else {
    allEvents[year].push({ id: uid(), title, category: cat, startDate: start, endDate: end, emoji });
  }

  persist(year);
  closeModal();
  if (year === curYear) renderCalendar();
}

function deleteEvent() {
  if (!editId) return;
  const start = document.getElementById('f-start').value;
  if (!start) return;
  const { year } = parseDate(start);
  allEvents[year] = (allEvents[year] || []).filter(e => e.id !== editId);
  persist(year);
  closeModal();
  if (year === curYear) renderCalendar();
}

// ── Export PNG ───────────────────────────────────────────────
function exportPNG() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Generating…';

  // Temporarily reset zoom to 1 so export is always full-resolution
  const savedZoom = curZoom;
  const scaler    = document.getElementById('page-scaler');
  scaler.style.zoom = 1;

  // Measure at zoom = 1
  const pageHeader = document.getElementById('page-header');
  const calWrap    = document.getElementById('cal-wrap');
  const totalW     = Math.max(pageHeader.scrollWidth, calWrap.scrollWidth);
  const totalH     = pageHeader.offsetHeight + calWrap.scrollHeight;

  html2canvas(document.body, {
    scale: 2,
    useCORS: true,
    backgroundColor: '#e8ecf1',
    x: 0, y: 0,
    width:  totalW,
    height: totalH,
    scrollX: 0,
    scrollY: 0,
    windowWidth:  totalW,
    windowHeight: totalH
  }).then(canvas => {
    const a = document.createElement('a');
    a.download = `year-planner-${curYear}.png`;
    a.href     = canvas.toDataURL('image/png');
    a.click();
  }).finally(() => {
    // Restore zoom
    scaler.style.zoom = savedZoom;
    btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export PNG`;
    btn.disabled = false;
  });
}

// ── Drag: move & resize event bars ───────────────────────────
let dragState = null;

function addDaysToDate(dateStr, days) {
  const p = parseDate(dateStr);
  const d = new Date(p.year, p.month, p.day + days);
  return padDate(d.getFullYear(), d.getMonth(), d.getDate());
}

function startDrag(e, ev, mode, barEl) {
  e.preventDefault();
  e.stopPropagation();
  dragState = {
    mode,
    ev:        { id: ev.id, title: ev.title, category: ev.category,
                 startDate: ev.startDate, endDate: ev.endDate, emoji: ev.emoji },
    startX:    e.clientX,
    origStart: ev.startDate,
    origEnd:   ev.endDate || ev.startDate,
    origLeft:  parseFloat(barEl.style.left)  || 0,
    origWidth: barEl.offsetWidth,
    barEl,
    moved: false,
  };
  document.body.style.userSelect = 'none';
  document.addEventListener('mousemove', onDragMove);
  document.addEventListener('mouseup',   onDragEnd);
  barEl.classList.add('dragging');
}

function onDragMove(e) {
  if (!dragState) return;
  const { mode, barEl, origLeft, origWidth, startX } = dragState;
  const deltaX = e.clientX - startX;
  if (Math.abs(deltaX) > 4) dragState.moved = true;
  const deltaDays = Math.round(deltaX / CELL_W);

  if (mode === 'move') {
    barEl.style.transform = `translateX(${deltaDays * CELL_W}px)`;
  } else if (mode === 'resize-end') {
    const newW = Math.max(CELL_W, origWidth + deltaDays * CELL_W);
    barEl.style.width = newW + 'px';
  } else { // resize-start
    const newL = origLeft + deltaDays * CELL_W;
    const newW = origWidth - deltaDays * CELL_W;
    if (newW >= CELL_W) { barEl.style.left = newL + 'px'; barEl.style.width = newW + 'px'; }
  }
}

function onDragEnd(e) {
  if (!dragState) return;
  document.removeEventListener('mousemove', onDragMove);
  document.removeEventListener('mouseup',   onDragEnd);
  document.body.style.userSelect = '';

  const { mode, ev, origStart, origEnd, moved, barEl } = dragState;
  const deltaX    = e.clientX - dragState.startX;
  const deltaDays = Math.round(deltaX / CELL_W);
  dragState = null;

  barEl.classList.remove('dragging');
  barEl.style.transform = '';

  if (!moved) {
    // Short tap → open modal as a click
    openModal(ev.startDate, ev);
    return;
  }
  if (deltaDays === 0) { renderCalendar(); return; }

  let newStart = origStart;
  let newEnd   = origEnd;
  if (mode === 'move') {
    newStart = addDaysToDate(origStart, deltaDays);
    newEnd   = origEnd !== origStart ? addDaysToDate(origEnd, deltaDays) : newStart;
  } else if (mode === 'resize-end') {
    newEnd = addDaysToDate(origEnd, deltaDays);
    if (dateInt(newEnd) < dateInt(newStart)) newEnd = newStart;
  } else { // resize-start
    newStart = addDaysToDate(origStart, deltaDays);
    if (dateInt(newStart) > dateInt(newEnd)) newStart = newEnd;
  }

  const origYear = parseDate(ev.startDate).year;
  const newYear  = parseDate(newStart).year;
  allEvents[origYear] = (allEvents[origYear] || []).filter(x => x.id !== ev.id);
  persist(origYear);
  if (!allEvents[newYear]) allEvents[newYear] = [];
  allEvents[newYear].push({
    ...ev,
    startDate: newStart,
    endDate:   newStart === newEnd ? null : newEnd,
  });
  persist(newYear);
  renderCalendar();
}

// ── Chip drag-to-move ────────────────────────────────────────
let chipDragState = null;

function startChipDrag(e, ev, chipEl, dateStr) {
  e.preventDefault();
  e.stopPropagation();

  // Build a ghost clone that floats with the cursor
  const rect = chipEl.getBoundingClientRect();
  const ghost = document.createElement('div');
  ghost.id = 'chip-ghost';
  ghost.textContent = chipEl.textContent;
  ghost.style.cssText = `
    background: ${getComputedStyle(chipEl).backgroundColor};
    color: ${getComputedStyle(chipEl).color};
    border: ${getComputedStyle(chipEl).border};
    width: ${rect.width}px;
    top: ${rect.top}px;
    left: ${rect.left}px;
  `;
  document.body.appendChild(ghost);

  chipEl.classList.add('chip-dragging');
  document.body.style.userSelect = 'none';

  chipDragState = {
    ev: { ...ev },
    chipEl,
    ghost,
    startX: e.clientX,
    startY: e.clientY,
    offsetX: e.clientX - rect.left,
    offsetY: e.clientY - rect.top,
    moved: false,
    lastTarget: null,
  };

  document.addEventListener('mousemove', onChipDragMove);
  document.addEventListener('mouseup',   onChipDragEnd);
}

function onChipDragMove(e) {
  if (!chipDragState) return;
  const { ghost, offsetX, offsetY, startX, startY } = chipDragState;
  if (Math.abs(e.clientX - startX) > 4 || Math.abs(e.clientY - startY) > 4) chipDragState.moved = true;

  ghost.style.left = (e.clientX - offsetX) + 'px';
  ghost.style.top  = (e.clientY - offsetY) + 'px';

  // Highlight target cell — use elementsFromPoint to see through ev-bars
  ghost.style.display = 'none';
  const els = document.elementsFromPoint(e.clientX, e.clientY);
  ghost.style.display = '';
  const cell = els.find(x => x.dataset?.date && !x.classList.contains('inactive')) || null;
  if (cell !== chipDragState.lastTarget) {
    if (chipDragState.lastTarget) chipDragState.lastTarget.classList.remove('drop-target');
    if (cell) {
      cell.classList.add('drop-target');
      chipDragState.lastTarget = cell;
    } else {
      chipDragState.lastTarget = null;
    }
  }
}

function onChipDragEnd(e) {
  if (!chipDragState) return;
  document.removeEventListener('mousemove', onChipDragMove);
  document.removeEventListener('mouseup',   onChipDragEnd);
  document.body.style.userSelect = '';

  const { ev, chipEl, ghost, moved, lastTarget } = chipDragState;
  chipDragState = null;

  ghost.remove();
  chipEl.classList.remove('chip-dragging');
  if (lastTarget) lastTarget.classList.remove('drop-target');

  if (!moved) {
    openModal(ev.startDate, ev);
    return;
  }

  const targetDate = lastTarget?.dataset?.date;
  if (!targetDate || targetDate === ev.startDate) { renderCalendar(); return; }

  const origYear = parseDate(ev.startDate).year;
  const newYear  = parseDate(targetDate).year;
  allEvents[origYear] = (allEvents[origYear] || []).filter(x => x.id !== ev.id);
  persist(origYear);
  if (!allEvents[newYear]) allEvents[newYear] = [];
  allEvents[newYear].push({ ...ev, startDate: targetDate, endDate: null });
  persist(newYear);
  renderCalendar();
}

// ── Chip resize-to-extend ────────────────────────────────────
let chipResizeState = null;

function startChipResize(e, ev, chipEl, dateStr) {
  e.preventDefault();
  e.stopPropagation();

  const rect = chipEl.getBoundingClientRect();
  const cs   = getComputedStyle(chipEl);

  const ghostBar = document.createElement('div');
  ghostBar.id = 'chip-ghost-bar';
  ghostBar.textContent = chipEl.textContent.trim();
  ghostBar.style.cssText = `
    background: ${cs.backgroundColor};
    color: ${cs.color};
    border: ${cs.border};
    left: ${rect.left}px;
    top: ${rect.top}px;
    width: ${rect.width}px;
  `;
  document.body.appendChild(ghostBar);

  document.body.style.userSelect = 'none';
  chipResizeState = {
    ev: { ...ev },
    chipEl,
    ghostBar,
    startDate: dateStr,
    lastTarget: null,
  };

  document.addEventListener('mousemove', onChipResizeMove);
  document.addEventListener('mouseup',   onChipResizeEnd);
}

function onChipResizeMove(e) {
  if (!chipResizeState) return;
  const { ghostBar, startDate } = chipResizeState;

  const el   = document.elementFromPoint(e.clientX, e.clientY);
  const cell = el && el.closest('[data-date]');

  if (chipResizeState.lastTarget) chipResizeState.lastTarget.classList.remove('drop-target');

  if (cell && !cell.classList.contains('inactive') && dateInt(cell.dataset.date) >= dateInt(startDate)) {
    cell.classList.add('drop-target');
    chipResizeState.lastTarget = cell;
    const spanDays = Math.round((dateInt(cell.dataset.date) - dateInt(startDate)));
    // spanDays is approx; compute real via addDaysToDate
    const numDays = (new Date(cell.dataset.date) - new Date(startDate)) / 86400000 + 1;
    ghostBar.style.width = Math.max(numDays * CELL_W * curZoom, CELL_W * curZoom) + 'px';
  } else {
    chipResizeState.lastTarget = null;
  }
}

function onChipResizeEnd(e) {
  if (!chipResizeState) return;
  document.removeEventListener('mousemove', onChipResizeMove);
  document.removeEventListener('mouseup',   onChipResizeEnd);
  document.body.style.userSelect = '';

  const { ev, ghostBar, startDate, lastTarget } = chipResizeState;
  chipResizeState = null;

  ghostBar.remove();
  if (lastTarget) lastTarget.classList.remove('drop-target');

  const targetDate = lastTarget?.dataset?.date;
  if (!targetDate || targetDate === startDate) return;

  const year = parseDate(startDate).year;
  const arr  = allEvents[year] || [];
  const idx  = arr.findIndex(x => x.id === ev.id);
  if (idx !== -1) arr[idx] = { ...arr[idx], endDate: targetDate };
  else arr.push({ ...ev, endDate: targetDate });
  allEvents[year] = arr;
  persist(year);
  renderCalendar();
}

// ── Categories ───────────────────────────────────────────────
const DEFAULT_CATEGORIES = [
  { id: 'adventures', label: 'Adventures',         color: '#f97316', style: 'solid'  },
  { id: 'occasions',  label: 'Occasions & Events', color: '#eab308', style: 'solid'  },
  { id: 'holidays',   label: 'Holiday & Trips',    color: '#0891b2', style: 'solid'  },
  { id: 'network',    label: 'Network/Career',     color: '#16a34a', style: 'solid'  },
  { id: 'misogi',     label: 'Misogi',             color: '#dc2626', style: 'dashed' },
  { id: 'bucketlist', label: 'Bucket List',        color: '#1e293b', style: 'dashed' },
];

let categories = [];

function loadCategories() {
  try {
    const stored = JSON.parse(localStorage.getItem('bac-categories'));
    categories = (Array.isArray(stored) && stored.length) ? stored : DEFAULT_CATEGORIES.map(c => ({ ...c }));
  } catch { categories = DEFAULT_CATEGORIES.map(c => ({ ...c })); }
}

function persistCategories() {
  localStorage.setItem('bac-categories', JSON.stringify(categories));
}

// ── Stat Holidays ─────────────────────────────────────────────
function holKey(y, c) { return `bac-holidays-${y}-${c}`; }

function loadHolidayList(year, country) {
  try {
    const stored = localStorage.getItem(holKey(year, country));
    if (stored) return JSON.parse(stored);
  } catch {}
  // First time: seed from built-in list
  const defaults = getHolidays(year, country);
  localStorage.setItem(holKey(year, country), JSON.stringify(defaults));
  return defaults;
}

function persistHolidayList(year, country, list) {
  localStorage.setItem(holKey(year, country), JSON.stringify(list));
}

function openHolManager() {
  document.getElementById('hol-mgr-label').textContent =
    `${curYear} · ${curCountry === 'CA' ? '🇨🇦 Canada' : '🇺🇸 United States'}`;
  renderHolList();
  document.getElementById('hol-manager-bg').classList.remove('hidden');
}

function closeHolManager() {
  document.getElementById('hol-manager-bg').classList.add('hidden');
}

function renderHolList() {
  const list  = loadHolidayList(curYear, curCountry);
  const el    = document.getElementById('hol-list');
  if (!list.length) {
    el.innerHTML = '<p style="color:#94a3b8;font:400 12px/1 var(--font);padding:8px 0">No holidays defined.</p>';
    return;
  }
  el.innerHTML = list
    .slice()
    .sort((a, b) => a.date < b.date ? -1 : 1)
    .map((h, i) => `
      <div class="hol-row">
        <span class="hol-date">${formatHolDate(h.date)}</span>
        <span class="hol-name">${h.name}</span>
        <button class="hol-del-btn" data-date="${h.date}" data-name="${h.name.replace(/"/g,'&quot;')}" title="Remove">🗑</button>
      </div>`)
    .join('');
  el.querySelectorAll('.hol-del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cur = loadHolidayList(curYear, curCountry);
      const updated = cur.filter(h => !(h.date === btn.dataset.date && h.name === btn.dataset.name));
      persistHolidayList(curYear, curCountry, updated);
      renderHolList();
      renderCalendar();
    });
  });
}

function formatHolDate(dateStr) {
  const [y, m, d] = dateStr.split('-').map(Number);
  return new Date(y, m - 1, d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function addHoliday() {
  const dateInp = document.getElementById('hol-add-date');
  const nameInp = document.getElementById('hol-add-name');
  const date    = dateInp.value;
  const name    = nameInp.value.trim();
  if (!date || !name) { nameInp.focus(); return; }
  const list = loadHolidayList(curYear, curCountry);
  list.push({ date, name });
  persistHolidayList(curYear, curCountry, list);
  dateInp.value = '';
  nameInp.value = '';
  renderHolList();
  renderCalendar();
}

function getCat(id) { return categories.find(c => c.id === id); }

function isLight(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return (r * 299 + g * 587 + b * 114) / 1000 > 155;
}

function applyCatStyle(el, catId) {
  const cat = getCat(catId);
  if (!cat) {
    el.style.background = '#94a3b8';
    el.style.border     = '';
    el.style.color      = '#fff';
    return;
  }
  if (cat.style === 'dashed') {
    el.style.background = 'transparent';
    el.style.border     = `2px dashed ${cat.color}`;
    el.style.color      = cat.color;
  } else {
    el.style.background = cat.color;
    el.style.border     = '';
    el.style.color      = isLight(cat.color) ? '#1e293b' : '#fff';
  }
}

function renderLegend() {
  const el = document.getElementById('legend');
  if (!el) return;
  el.innerHTML = categories.map(cat => {
    const swStyle = cat.style === 'dashed'
      ? `background:transparent;border:2.5px dashed ${cat.color};`
      : `background:${cat.color};`;
    return `<div class="leg-item">
      <span class="leg-swatch" style="${swStyle}"></span>
      <span class="leg-label">${cat.label}</span>
    </div>`;
  }).join('');
}

function renderCatSelect() {
  const sel = document.getElementById('f-cat');
  if (!sel) return;
  const prev = sel.value;
  sel.innerHTML = categories.map(c => `<option value="${c.id}">${c.label}</option>`).join('');
  if (categories.find(c => c.id === prev)) sel.value = prev;
}

// ── Category Manager ─────────────────────────────────────────
let stagedCats = [];

function openCatManager() {
  stagedCats = categories.map(c => ({ ...c }));
  renderCatManager();
  document.getElementById('cat-manager-bg').classList.remove('hidden');
}

function closeCatManager() {
  document.getElementById('cat-manager-bg').classList.add('hidden');
}

function renderCatManager() {
  const list = document.getElementById('cat-list');
  if (!list) return;
  const allYears = [2026, 2027, 2028];
  list.innerHTML = stagedCats.map((cat, i) => {
    const usage = allYears.flatMap(y => allEvents[y] || []).filter(e => e.category === cat.id).length;
    const warnHtml = usage > 0 ? `<span class="cat-usage-warn">${usage} event${usage > 1 ? 's' : ''} use this</span>` : '';
    const solidActive  = cat.style === 'solid'  ? ' active' : '';
    const dashedActive = cat.style === 'dashed' ? ' active' : '';
    const canDel = stagedCats.length > 1 ? '' : ' disabled';
    return `<div class="cat-row" data-idx="${i}">
      <input type="color" class="cat-color-inp" value="${cat.color}" data-idx="${i}" title="Pick color">
      <input type="text"  class="cat-name-inp"  value="${cat.label}" data-idx="${i}" maxlength="40" placeholder="Category name">
      <div class="cat-style-grp">
        <button class="cat-style-btn${solidActive}"  data-idx="${i}" data-style="solid">Solid</button>
        <button class="cat-style-btn${dashedActive}" data-idx="${i}" data-style="dashed">Dashed</button>
      </div>
      ${warnHtml}
      <button class="cat-del-btn" data-idx="${i}"${canDel} title="Delete category">🗑</button>
    </div>`;
  }).join('');

  // Bind events on the freshly-rendered rows
  list.querySelectorAll('.cat-color-inp').forEach(inp => {
    inp.addEventListener('input', e => { stagedCats[+e.target.dataset.idx].color = e.target.value; });
  });
  list.querySelectorAll('.cat-name-inp').forEach(inp => {
    inp.addEventListener('input', e => { stagedCats[+e.target.dataset.idx].label = e.target.value; });
  });
  list.querySelectorAll('.cat-style-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.dataset.idx;
      stagedCats[idx].style = e.target.dataset.style;
      renderCatManager();
    });
  });
  list.querySelectorAll('.cat-del-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      const idx = +e.target.dataset.idx;
      if (stagedCats.length <= 1) return;
      stagedCats.splice(idx, 1);
      renderCatManager();
    });
  });
}

function addStagedCat() {
  const rand = Math.random().toString(36).slice(2, 6);
  stagedCats.push({ id: `cat-${rand}`, label: 'New Category', color: '#6366f1', style: 'solid' });
  renderCatManager();
  // Focus the new name input
  const inputs = document.querySelectorAll('#cat-list .cat-name-inp');
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function commitCatChanges() {
  // Validate: ensure all labels are non-empty
  for (const c of stagedCats) {
    if (!c.label.trim()) { alert('All categories must have a name.'); return; }
  }
  categories = stagedCats.map(c => ({ ...c, label: c.label.trim() }));
  persistCategories();
  renderLegend();
  renderCatSelect();
  closeCatManager();
  renderCalendar();
}

  // Apply and render
  curYear    = setupYear;
  curCountry = setupCountry;
  document.getElementById('title-year').textContent = curYear;
  updateSettingsLabel();
  renderCalendar();
}

// Setup year card clicks
document.querySelectorAll('.setup-year-card').forEach(b =>
  b.addEventListener('click', () => {
    setupYear = +b.dataset.setupY;
    document.querySelectorAll('.setup-year-card').forEach(x =>
      x.classList.toggle('selected', x === b));
  }));

// Setup country button clicks
document.querySelectorAll('.setup-country-btn').forEach(b =>
  b.addEventListener('click', () => {
    setupCountry = b.dataset.setupC;
    document.querySelectorAll('.setup-country-btn').forEach(x =>
      x.classList.toggle('selected', x === b));
  }));

document.getElementById('setup-start-btn').addEventListener('click', applySetup);
document.getElementById('settings-btn').addEventListener('click', openSetup);
document.getElementById('setup-cancel-btn').addEventListener('click', () => {
  document.getElementById('setup-overlay').classList.add('hidden');
});

// ── Controls ─────────────────────────────────────────────────
function setYear(y) {
  curYear = y;
  document.getElementById('title-year').textContent = y;
  updateSettingsLabel();
  renderCalendar();
}

function setCountry(c) {
  curCountry = c;
  updateSettingsLabel();
  renderCalendar();
}

document.getElementById('export-btn').addEventListener('click', exportPNG);
document.getElementById('btn-save').addEventListener('click', saveEvent);
document.getElementById('btn-del').addEventListener('click', deleteEvent);
document.getElementById('btn-cancel').addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);

document.getElementById('modal-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-bg')) closeModal();
});

document.getElementById('hol-mgr-btn').addEventListener('click', openHolManager);
document.getElementById('hol-mgr-close').addEventListener('click', closeHolManager);
document.getElementById('hol-add-btn').addEventListener('click', addHoliday);
document.getElementById('hol-add-name').addEventListener('keydown', e => { if (e.key === 'Enter') addHoliday(); });
document.getElementById('hol-manager-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('hol-manager-bg')) closeHolManager();
});

document.getElementById('cat-mgr-btn').addEventListener('click', openCatManager);
document.getElementById('cat-mgr-close').addEventListener('click', closeCatManager);
document.getElementById('cat-add-btn').addEventListener('click', addStagedCat);
document.getElementById('cat-save-btn').addEventListener('click', commitCatChanges);
document.getElementById('cat-manager-bg').addEventListener('click', e => {
  if (e.target === document.getElementById('cat-manager-bg')) closeCatManager();
});

document.addEventListener('keydown', e => {
  const modalOpen = !document.getElementById('modal-bg').classList.contains('hidden');

  // Modal shortcuts
  if (modalOpen) {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter' && document.activeElement.tagName !== 'BUTTON'
        && document.activeElement.tagName !== 'SELECT') saveEvent();
    return;
  }

  // Zoom keyboard shortcuts (Ctrl/Cmd)
  if (e.ctrlKey || e.metaKey) {
    if (e.key === '=' || e.key === '+') { e.preventDefault(); setZoom(curZoom + ZOOM_STEP); }
    if (e.key === '-' || e.key === '_') { e.preventDefault(); setZoom(curZoom - ZOOM_STEP); }
    if (e.key === '0')                  { e.preventDefault(); setZoom(1); }
  }
});

// ── Zoom ─────────────────────────────────────────────────────
function setZoom(z) {
  curZoom = Math.round(Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)) * 100) / 100;
  document.getElementById('page-scaler').style.zoom = curZoom;
  document.getElementById('zoom-pct').textContent   = Math.round(curZoom * 100) + '%';
}

// Zoom bar buttons
document.getElementById('zoom-in') .addEventListener('click', () => setZoom(curZoom + ZOOM_STEP));
document.getElementById('zoom-out').addEventListener('click', () => setZoom(curZoom - ZOOM_STEP));
document.getElementById('zoom-pct').addEventListener('click', () => setZoom(1));

// Ctrl/Cmd + scroll wheel
window.addEventListener('wheel', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  e.preventDefault();
  // Smaller delta for trackpad (deltaMode 0), larger for mouse wheel
  const step = Math.abs(e.deltaY) < 50 ? ZOOM_STEP * 0.5 : ZOOM_STEP;
  setZoom(curZoom + (e.deltaY < 0 ? step : -step));
}, { passive: false });

// ── Init ─────────────────────────────────────────────────────
loadCategories();
loadAll();
setZoom(1);
renderLegend();
renderCatSelect();

// Restore last-used preferences so setup screen is pre-populated
const _savedY = localStorage.getItem('bac-setup-year');
const _savedC = localStorage.getItem('bac-setup-country');
if (_savedY && [2026, 2027, 2028].includes(+_savedY)) curYear    = +_savedY;
if (_savedC && ['CA', 'US'].includes(_savedC))        curCountry = _savedC;

updateSettingsLabel();
openSetup();   // Show setup overlay on every page load
</script>
